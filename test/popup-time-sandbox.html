<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Claude Quota Tracker Time Sandbox</title>
    <link rel="stylesheet" href="../popup.css">
    <script>
      const realDate = Date;
      const params = new URLSearchParams(window.location.search);
      const phase = params.get("phase") || "before";
      const resetAt = new realDate("2026-05-03T22:40:00-04:00").getTime();
      const fixedNow = new realDate(
        phase === "after" ? "2026-05-03T22:41:00-04:00" : "2026-05-03T22:39:00-04:00"
      ).getTime();

      class MockDate extends realDate {
        constructor(...args) {
          super(...(args.length ? args : [fixedNow]));
        }

        static now() {
          return fixedNow;
        }
      }

      MockDate.parse = realDate.parse;
      MockDate.UTC = realDate.UTC;
      window.Date = MockDate;

      window.__mockStorage = {
        claudeActiveAccountId: "available@example.com",
        claudeAccounts: {
          "available@example.com": {
            id: "available@example.com",
            email: "available@example.com",
            label: "available@example.com",
            firstSeenAt: fixedNow - 3600000,
            lastSeenAt: fixedNow - 300000
          },
          "blocked@example.com": {
            id: "blocked@example.com",
            email: "blocked@example.com",
            label: "blocked@example.com",
            firstSeenAt: fixedNow - 7200000,
            lastSeenAt: fixedNow - 60000,
            quotaResetAt: resetAt
          }
        }
      };

      window.chrome = {
        storage: {
          local: {
            async get(keys) {
              return Object.fromEntries(keys.map((key) => [key, window.__mockStorage[key]]));
            }
          },
          onChanged: {
            addListener() {}
          }
        }
      };
    </script>
  </head>
  <body>
    <main class="app">
      <header class="header">
        <div>
          <h1>Claude Accounts</h1>
          <p id="summary">Loading accounts...</p>
        </div>
        <button id="refreshButton" class="icon-button" type="button" title="Refresh accounts" aria-label="Refresh accounts">
          &#8635;
        </button>
      </header>

      <section id="accountList" class="account-list" aria-live="polite"></section>

      <template id="accountTemplate">
        <article class="account-card">
          <div class="account-main">
            <div class="account-label"></div>
            <div class="account-meta"></div>
          </div>
          <div class="account-status"></div>
        </article>
      </template>
    </main>

    <script src="../popup.js"></script>
  </body>
</html>
