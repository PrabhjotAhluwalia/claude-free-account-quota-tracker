<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Claude Quota Tracker Content Sandbox</title>
    <script>
      window.__mockStorage = {};
      window.chrome = {
        storage: {
          local: {
            async get(keys) {
              if (Array.isArray(keys)) {
                return Object.fromEntries(keys.map((key) => [key, window.__mockStorage[key]]));
              }

              if (typeof keys === "string") {
                return { [keys]: window.__mockStorage[keys] };
              }

              return { ...window.__mockStorage };
            },
            async set(values) {
              Object.assign(window.__mockStorage, values);
            }
          }
        },
        runtime: {
          sendMessage(message) {
            window.__messages.push(message);
            return Promise.resolve({ ok: true });
          }
        }
      };
      window.__messages = [];
      localStorage.setItem("claude-auth-user", JSON.stringify({
        user: {
          email: "sandbox.account@example.com",
          displayName: "Sandbox Account"
        }
      }));
    </script>
  </head>
  <body>
    <main data-testid="chat">
      <button data-testid="profile-menu" aria-label="Account sandbox.account@example.com">SA</button>
      <textarea aria-label="Write a message"></textarea>
      <div class="composer-banner">You are out of free messages until 10:40 PM <a href="#">Get more</a></div>
    </main>
    <pre id="result"></pre>
    <script src="../content.js"></script>
    <script>
      setTimeout(() => {
        document.getElementById("result").textContent = JSON.stringify({
          storage: window.__mockStorage,
          messages: window.__messages
        }, null, 2);
      }, 1200);
    </script>
  </body>
</html>
